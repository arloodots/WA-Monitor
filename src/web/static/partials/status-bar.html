<div class="user-info">
  <div class="details" id="status-bar-details">
    <span class="status-dot disconnected-dot"></span> Loading status...
  </div>
  <div class="kebab-menu">
    <button class="kebab-btn" onclick="toggleKebab(event)" aria-label="Menu">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="1"></circle><circle cx="12" cy="5" r="1"></circle><circle cx="12" cy="19" r="1"></circle></svg>
    </button>
    <div class="kebab-dropdown" id="kebab-dropdown">
      <a href="/settings">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
        Settings
      </a>
      <a href="/backup">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
        Backup
      </a>
      <button id="disconnect-btn" onclick="disconnectDevice()" style="display:none">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18.36 6.64a9 9 0 1 1-12.73 0"></path><line x1="12" y1="2" x2="12" y2="12"></line></svg>
        Disconnect
      </button>
    </div>
  </div>
</div>
<script>
  function toggleKebab(e) {
    e.stopPropagation();
    document.getElementById('kebab-dropdown').classList.toggle('open');
  }
  document.addEventListener('click', () => {
    document.getElementById('kebab-dropdown')?.classList.remove('open');
  });

  async function disconnectDevice() {
    if (!confirm('Disconnect this device from WhatsApp?')) return;
    const csrf = document.querySelector('meta[name="csrf-token"]').content;
    await fetch('/disconnect', {
      method: 'POST',
      headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
      body: '_csrf=' + encodeURIComponent(csrf),
      redirect: 'manual',
    });
    for (let i = 0; i < 10; i++) {
      await new Promise(r => setTimeout(r, 500));
      try {
        const data = await (await fetch('/api/status')).json();
        if (data.state !== 'open') break;
      } catch { break; }
    }
    window.location.reload();
  }

  (async function initStatusBar() {
    try {
      const res = await fetch('/api/status');
      if (res.status === 401) { window.location.href = '/login'; return; }
      const data = await res.json();
      const el = document.getElementById('status-bar-details');
      const connectedDot = '<span class="status-dot connected-dot"></span>';
      const disconnectedDot = '<span class="status-dot disconnected-dot"></span>';
      const bar = el.closest('.user-info');
      if (data.state === 'open') {
        bar.classList.add('connected');
        const phone = data.user?.phone ? '+' + data.user.phone : null;
        const name = data.user?.name || null;
        let text = 'Connected as';
        if (phone) text += ' <span class="phone-text">' + phone + '</span>';
        if (name) text += ' <span class="phone-text">(' + name + ')</span>';
        el.innerHTML = connectedDot + text;
        document.getElementById('disconnect-btn').style.display = 'flex';
      } else {
        bar.classList.add('disconnected');
        el.innerHTML = disconnectedDot + 'Not connected';
      }
      document.dispatchEvent(new CustomEvent('statusbar:state', { detail: data.state }));
    } catch {
      document.getElementById('status-bar-details').innerHTML = '<span class="status-dot disconnected-dot"></span>Not connected';
    }
  })();
</script>
