<header>
  <a href="/" style="text-decoration: none;" class="brand-wrapper">
    <div class="brand-logo">
      <svg viewBox="0 0 24 24">
        <path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"></path>
      </svg>
    </div>
    <h1>{{PROJECT_NAME}}</h1>
  </a>
  <nav>
    <div class="theme-picker-container">
      <select id="theme-selector" onchange="changeTheme(this.value)" class="theme-select" aria-label="Select Theme">
        <option value="glassmorphism">💎 Glassmorphic</option>
        <option value="light">☀️ Light Elegant</option>
        <option value="dark">🌙 Dark Flat</option>
        <option value="neon">⚡ Neon Cyber</option>
        <option value="sunset">🌅 Warm Sunset</option>
      </select>
    </div>
    <form method="POST" action="/logout" style="display:inline">
      <input type="hidden" name="_csrf" value="{{CSRF_TOKEN}}" />
      <button type="submit" class="logout-btn">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
        Log out {{ADMIN_USERNAME}}
      </button>
    </form>
  </nav>
</header>
