<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login &middot; WhatsApp Group Monitor</title>
  <link rel="stylesheet" href="/static/shared.css" />
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      padding: 1rem;
    }
    .login-card {
      background: var(--surface-bg);
      backdrop-filter: var(--glass-blur);
      -webkit-backdrop-filter: var(--glass-blur);
      border: 1px solid var(--surface-border);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-lg);
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 380px;
      text-align: center;
    }
    .login-brand {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 54px;
      height: 54px;
      background: linear-gradient(135deg, #10b981 0%, #059669 100%);
      border-radius: 16px;
      margin-bottom: 1.25rem;
      box-shadow: 0 0 20px rgba(16, 185, 129, 0.4);
    }
    .login-brand svg {
      width: 28px;
      height: 28px;
      fill: none;
      stroke: #ffffff;
      stroke-width: 2.2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    h1 {
      color: var(--text-main);
      font-size: 1.4rem;
      font-weight: 700;
      margin: 0 0 0.5rem;
      letter-spacing: -0.02em;
    }
    .subtitle {
      color: var(--text-muted);
      font-size: 0.875rem;
      margin-bottom: 1.75rem;
    }
    form {
      display: flex;
      flex-direction: column;
      gap: 1.1rem;
    }
    .input-wrap {
      position: relative;
    }
    .input-wrap svg {
      position: absolute;
      left: 1rem;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-subtle);
      pointer-events: none;
      transition: color 0.2s ease;
    }
    .input-wrap input {
      padding-left: 2.75rem;
    }
    .input-wrap input:focus + svg {
      color: var(--primary);
    }
    button[type="submit"] {
      width: 100%;
      padding: 0.8rem;
      margin-top: 0.5rem;
    }
    .error {
      background: var(--danger-subtle);
      border: 1px solid rgba(239, 68, 68, 0.3);
      border-radius: var(--radius-md);
      padding: 0.75rem;
      color: var(--danger);
      font-size: 0.875rem;
      font-weight: 500;
      margin-bottom: 1.25rem;
      display: none;
    }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="login-brand">
      <svg viewBox="0 0 24 24">
        <path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"></path>
      </svg>
    </div>
    <h1>WhatsApp Monitor</h1>
    <p class="subtitle">Enter your admin credentials to sign in</p>
    <div class="error" id="error">Invalid username or password</div>
    <form method="POST" action="/login">
      <input type="hidden" name="_csrf" value="{{CSRF_TOKEN}}" />
      <div class="input-wrap">
        <input type="text" name="username" placeholder="Username" required autocomplete="username" />
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
      </div>
      <div class="input-wrap">
        <input type="password" name="password" placeholder="Password" required autocomplete="current-password" />
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
      </div>
      <button type="submit" class="action-btn">Log in</button>
    </form>
  </div>
  <script>
    if (new URLSearchParams(window.location.search).has('error')) {
      document.getElementById('error').style.display = 'block';
    }
  </script>
</body>
</html>
