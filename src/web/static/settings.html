<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Settings &middot; {{PROJECT_NAME}}</title>
  <meta name="csrf-token" content="{{CSRF_TOKEN}}" />
  <link rel="stylesheet" href="/static/shared.css" />
  <script src="/static/shared.js"></script>
  <style>
    .settings-box {
      background: var(--surface-bg);
      backdrop-filter: var(--glass-blur);
      -webkit-backdrop-filter: var(--glass-blur);
      border: 1px solid var(--surface-border);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-lg);
      padding: 2rem;
      max-width: 460px;
      margin: 1.5rem auto;
    }
    .settings-header {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 1.5rem;
    }
    .settings-header h2 {
      color: var(--text-main);
      font-size: 1.25rem;
      font-weight: 700;
      margin: 0;
    }
    .form-group {
      margin-bottom: 1.25rem;
    }
    .msg {
      font-size: 0.875rem;
      font-weight: 500;
      margin-top: 1rem;
      padding: 0.5rem 0.75rem;
      border-radius: var(--radius-sm);
      display: none;
    }
    .msg-ok {
      display: block;
      color: var(--primary);
      background: var(--primary-subtle);
      border: 1px solid rgba(16, 185, 129, 0.25);
    }
    .msg-err {
      display: block;
      color: var(--danger);
      background: var(--danger-subtle);
      border: 1px solid rgba(239, 68, 68, 0.25);
    }
  </style>
</head>
<body>
  {{> header}}
  <div class="content">
    {{> status-bar}}
    <a class="back" href="/" id="back-link">&larr; Back to groups</a>
    <div class="settings-box">
      <div class="settings-header">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#10b981" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
        <h2>System Settings</h2>
      </div>
      <form id="form" onsubmit="save(event)">
        <div class="form-group">
          <label for="project_name">Project name</label>
          <input type="text" id="project_name" name="project_name" placeholder="WhatsApp Group Monitor" />
        </div>

        <div class="form-group">
          <label for="page_size">Items per page</label>
          <input type="number" id="page_size" name="page_size" min="10" max="500" placeholder="50" />
        </div>

        <button type="submit" class="save-btn">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path><polyline points="17 21 17 13 7 13 7 21"></polyline><polyline points="7 3 7 8 15 8"></polyline></svg>
          Save changes
        </button>
        <p class="msg" id="msg"></p>
      </form>
    </div>
  </div>
  <script>
    const csrf = document.querySelector('meta[name="csrf-token"]').content;

    async function load() {
      try {
        const res = await fetch('/api/settings');
        const data = await res.json();
        document.getElementById('project_name').value = data.project_name || '';
        document.getElementById('page_size').value = data.page_size || '50';
      } catch (e) {
        showMsg('Failed to load settings', false);
      }
    }

    async function save(e) {
      e.preventDefault();
      try {
        const res = await fetch('/api/settings', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'x-csrf-token': csrf },
          body: JSON.stringify({
            project_name: document.getElementById('project_name').value,
            page_size: document.getElementById('page_size').value,
          }),
        });
        if (res.ok) showMsg('Settings saved successfully', true);
        else showMsg('Failed to save settings', false);
      } catch (e) {
        showMsg('Failed to save settings', false);
      }
    }

    function showMsg(text, ok) {
      const el = document.getElementById('msg');
      el.textContent = text;
      el.className = 'msg ' + (ok ? 'msg-ok' : 'msg-err');
      setTimeout(() => { el.style.display = 'none'; }, 3000);
    }

    document.addEventListener('statusbar:state', (e) => {
      if (e.detail !== 'open') document.getElementById('back-link').textContent = '\u2190 Back';
    });

    load();
  </script>
</body>
</html>
